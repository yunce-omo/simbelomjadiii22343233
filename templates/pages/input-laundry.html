<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css')}}">

<!-- ─── PAGE: INPUT LAUNDRY ─── -->
<div class="page" id="pg-input-laundry">

    <div class="page-header">
        <h2>Input Laundry Baru</h2>
        <p>Tambahkan pesanan laundry masuk</p>
    </div>

    <form action="/dashboard1" method="POST">

        <div class="card">
            <div class="card-header">
                <div class="card-title">Form Input Pesanan</div>
            </div>

            <div class="card-body">

                <div class="form-grid">

                    <div class="form-group">
                        <label class="form-label">Nama Pelanggan *</label>
                        <input class="form-control" type="text" name="nama_pelanggan" required placeholder="Masukkan Nama Pelanggan...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis Kelamin</label>
                        <select class="form-control" name="jenis_kelamin">
                            <option value="">Pilih...</option>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">No WhatsApp *</label>
                        <input class="form-control" 
                        type="text" 
                        name="no_wa" 
                        required
                        maxlength="13"
                        minlength="12"
                        placeholder="Masukkan Nomor WhatsApp Pelanggan...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Paket Laundry *</label>
                        <select class="form-control" name="paket_laundry" required>
                            <option value="">Pilih paket...</option>
                            <option value=3>Santuy</option>
                            <option value=1>Kilat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Berat (kg)</label>
                        <input class="form-control" type="number" name="berat" placeholder="Masukkan Berat Cucian">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Layanan Antar-Jemput</label>
                        <select class="form-control" name="antar_jemput">
                            <option value="">Offline/Online...</option>
                            <option value="Offline">Tidak (Offline)</option>
                            <option value="Online">Antar & Jemput (Online)</option>
                        </select>
                    </div>

                </div>

                <div class="form-group">
                    <label class="form-label">Catatan</label>
                    <textarea class="form-control" name="catatan"></textarea>
                </div>

                <div style="display:flex; gap:10px;">
                    <button type="submit" class="btn btn-primary">💾 Simpan</button>
                    <button type="reset" class="btn btn-outline">Reset</button>
                </div>

            </div>
        </div>

    </form>

</div>
